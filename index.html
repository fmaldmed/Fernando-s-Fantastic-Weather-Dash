<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css links -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/open-iconic/1.1.1/font/css/open-iconic-bootstrap.min.css"/>
    <link rel="stylesheet" href="./Assets/CSS/style.css" />
    <title>Weather Dashboard</title>
</head>
<body>
    <header class="bg-primary bg-gradient">
        <h1 class="p-2 text-light text-center h1">Weather Dashboard</h1>
    </header>
    <!-- main -->
    <div class="m-4 p-4">
        <div class="col-md-12">
            <div class="row">
                <!-- search section -->
                <div class="col-md-3">
                    <!-- search form -->
                    <h5>Search for a City:</h5>
                    <form class="form-inline" id="city-search-form">
                        <input type="text" class="form-input mb-3 ds-input" id="cityname" placeholder="Enter city name...">
                        <button type="submit" id="searchbtn" class="btn btn-primary mb-3">Get City Weather. <span class="oi oi-magnifying-glass"></span></button>
                    </form>
                    <!-- search history-->
                    <ul class="list-group" id="search-history">
                    </ul>
                </div>
                <!-- results section -->
                <div class="col-md-9 results">
                    <!-- city weather data -->
                    <div class="card mt-2 card-main-div">
                        <div class="card" id="cityweather">
                        </div>
                    </div>
                    <!-- 5-day forecast -->
                    <div>
                        <h2 class="card-title mt-3">5-Day Forecast:</h2>
                        <div class="row justify-content-between" id="five-day">
                            <!-- filled by displayWeather() -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- javaScript links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.10.3/dayjs.min.js"></script>
    <script src="./Assets/JS/script.js"></script>
</body>
</html>
